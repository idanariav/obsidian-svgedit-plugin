<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="./svgedit.css" rel="stylesheet" media="all">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    #container { width: 100%; height: 100vh; }
  </style>
  <title>SVG-edit</title>
</head>
<body>
  <div id="container"></div>
</body>
<script src="./iife-Editor.js"></script>
<script>
  // Forward modifier-key events (Cmd/Ctrl+P, Cmd+, etc.) to the Obsidian
  // parent window so global keyboard shortcuts remain reachable while the
  // iframe has focus.
  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && window.parent !== window) {
      try {
        window.parent.document.dispatchEvent(new KeyboardEvent('keydown', {
          key: e.key,
          code: e.code,
          metaKey: e.metaKey,
          ctrlKey: e.ctrlKey,
          altKey: e.altKey,
          shiftKey: e.shiftKey,
          bubbles: true,
          cancelable: true
        }));
      } catch (_) {}
    }
  }, true /* capture phase, before svgedit sees the event */);

  const EditorCtor = (window.Editor && window.Editor.default) || window.Editor;
  const svgEditor = new EditorCtor(document.getElementById('container'));
  svgEditor.setConfig({
    allowInitialUserOverride: true,
    extensions: [],
    noDefaultExtensions: false,
    userExtensions: [],
    no_save_warning: true,
    initTool: 'select'
  });
  svgEditor.init().then(function () {
    window.svgEditor = svgEditor;
  });
</script>
</html>
